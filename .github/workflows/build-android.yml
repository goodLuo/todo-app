name: Build Android APK

on:
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支时触发
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitignore'
  # PR 时触发（可选）
  # pull_request:
  #   branches: [main]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 设置 Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 安装 Web 项目依赖
      - name: Install dependencies
        run: npm ci

      # 4. 构建 Web 项目
      - name: Build web project
        run: npm run build

      # 5. 安装 Capacitor CLI 和 Android 平台
      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android
          npm install @capacitor/app @capacitor/haptics @capacitor/status-bar @capacitor/splash-screen @capacitor/local-notifications

      # 6. 初始化 Capacitor（如果还没初始化）
      - name: Initialize Capacitor
        run: npx cap init "待办清单" "com.todoapp.checklist" --web-dir dist || true

      # 7. 添加 Android 平台
      - name: Add Android platform
        run: npx cap add android || true

      # 8. 同步到 Android
      - name: Sync Capacitor
        run: npx cap sync android

      # 9. 设置 JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      # 10. 设置 Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # 11. 给 Gradle 执行权限
      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # 12. 构建 Debug APK
      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # 13. 上传 Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

  # Release 构建（需要签名密钥）
  build-release:
    name: Build Release APK
    runs-on: ubuntu-latest
    # 只在手动触发时构建 Release 版本
    if: github.event_name == 'workflow_dispatch'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web project
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli
          npm install @capacitor/android
          npm install @capacitor/app @capacitor/haptics @capacitor/status-bar @capacitor/splash-screen @capacitor/local-notifications

      - name: Initialize Capacitor
        run: npx cap init "待办清单" "com.todoapp.checklist" --web-dir dist || true

      - name: Add Android platform
        run: npx cap add android || true

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      # 解码签名密钥（从 GitHub Secrets 获取）
      - name: Decode Keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo $KEYSTORE_BASE64 | base64 -d > android/app/release-key.jks

      # 构建 Release APK
      - name: Build Release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          if [ -f "app/release-key.jks" ]; then
            ./gradlew assembleRelease \
              -Pandroid.injected.signing.store.file=release-key.jks \
              -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
              -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
              -Pandroid.injected.signing.key.password=$KEY_PASSWORD \
              --no-daemon
          else
            echo "No keystore found, building unsigned release APK"
            ./gradlew assembleRelease --no-daemon
          fi

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 90
